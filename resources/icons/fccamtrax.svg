<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Cam body (disk cam shape) -->
  <circle cx="32" cy="32" r="24" fill="#607080" stroke="#2a3a4a" stroke-width="2"/>
  <!-- Center bore -->
  <circle cx="32" cy="32" r="6" fill="#2a3a4a"/>
  <!-- Keyway indicator -->
  <rect x="29" y="26" width="6" height="6" fill="#2a3a4a"/>
  <!-- Pitch curve hint (wavy line) -->
  <path d="M 32 8 Q 40 14, 48 20 Q 52 28, 50 36 Q 48 44, 40 50 Q 32 54, 24 50 Q 16 44, 14 36 Q 12 28, 16 20 Q 24 14, 32 8"
        fill="none" stroke="#e04040" stroke-width="1.5" stroke-dasharray="3,2"/>
  <!-- Follower (vertical line) -->
  <line x1="32" y1="4" x2="32" y2="14" stroke="#40a0e0" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Roller -->
  <circle cx="32" cy="12" r="3" fill="#40a0e0" stroke="#2070a0" stroke-width="1"/>
</svg>
